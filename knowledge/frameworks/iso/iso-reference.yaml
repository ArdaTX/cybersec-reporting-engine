iso_27002_implementation_attributes:
  attribute_types:
    - name: Control Type
      values: [Preventive, Detective, Corrective]
    - name: Information Security Properties
      values: [Confidentiality, Integrity, Availability]
    - name: Cybersecurity Concepts
      values: [Identify, Protect, Detect, Respond, Recover]
    - name: Operational Capabilities
      values: [Governance, Asset Management, Information Protection, Human Resource Security, Physical Security, System and Network Security, Application Security, Secure Configuration, Identity and Access Management, Threat and Vulnerability Management, Continuity, Supplier Relationships Security, Legal and Compliance, Information Security Event Management, Information Security Assurance]
    - name: Security Domains
      values: [Governance and Ecosystem, Protection, Defence, Resilience]
