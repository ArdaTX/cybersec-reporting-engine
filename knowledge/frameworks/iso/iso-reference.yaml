      - id: "8.1"
        name: User Endpoint Devices
        type: Technological
        description: Protect user endpoint devices
      - id: "8.2"
        name: Privileged Access Rights
        type: Technological
        description: Restrict and manage privileged access
      - id: "8.3"
        name: Information Access Restriction
        type: Technological
        description: Restrict access to information and systems
      - id: "8.4"
        name: Access to Source Code
        type: Technological
        description: Restrict access to source code
      - id: "8.5"
        name: Secure Authentication
        type: Technological
        description: Implement secure authentication technologies
      - id: "8.6"
        name: Capacity Management
        type: Technological
        description: Monitor and manage system capacity
      - id: "8.7"
        name: Protection Against Malware
        type: Technological
