      - id: "7.13"
        name: Equipment Maintenance
        type: Physical
        description: Maintain equipment to ensure security
      - id: "7.14"
        name: Secure Disposal or Re-use of Equipment
        type: Physical
        description: Dispose or reuse equipment securely

