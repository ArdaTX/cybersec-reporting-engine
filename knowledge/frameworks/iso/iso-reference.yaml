      - id: "8.8"
        name: Management of Technical Vulnerabilities
        type: Technological
        description: Manage technical vulnerabilities
      - id: "8.9"
        name: Configuration Management
        type: Technological
        description: Manage secure configurations
      - id: "8.10"
