      control_count: 13
      description: Maintain plans for emergency operations
      key_controls: [CP-2 Contingency Plan, CP-4 Contingency Plan Testing, CP-9 System Backup, CP-10 System Recovery and Reconstitution]

    - id: IA
      name: Identification and Authentication
      control_count: 12
      description: Verify the identity of users, processes, or devices
      key_controls: [IA-2 Identification and Authentication, IA-2(1) MFA for Privileged, IA-2(2) MFA for Non-privileged, IA-5 Authenticator Management]

    - id: IR
      name: Incident Response
      control_count: 10
      description: Establish incident handling capability
      key_controls: [IR-1 Policy and Procedures, IR-2 Incident Response Training, IR-4 Incident Handling, IR-6 Incident Reporting]

    - id: MA
      name: Maintenance
      control_count: 6
      description: Perform regular system maintenance
      key_controls: [MA-2 Controlled Maintenance, MA-4 Nonlocal Maintenance]

    - id: MP
      name: Media Protection
      control_count: 8
      description: Protect digital and physical media
      key_controls: [MP-2 Media Access, MP-4 Media Storage, MP-6 Media Sanitization, MP-7 Media Use]

    - id: PE
      name: Physical and Environmental Protection
      control_count: 23
      description: Protect physical resources and infrastructure
      key_controls: [PE-3 Physical Access Control, PE-6 Monitoring Physical Access, PE-8 Visitor Access Records]

    - id: PL
      name: Planning
      control_count: 11
      description: Plan security architecture and operations
      key_controls: [PL-2 System Security Plan, PL-8 Security and Privacy Architectures]

    - id: PM
      name: Program Management
      control_count: 30
      description: Manage information security program
      key_controls: [PM-5 System Inventory, PM-9 Risk Management Strategy, PM-30 Continuous Monitoring Strategy]

    - id: PS
      name: Personnel Security
      control_count: 9
      description: Manage personnel risk
