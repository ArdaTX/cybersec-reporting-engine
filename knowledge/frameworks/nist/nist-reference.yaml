    - id: RA
      name: Risk Assessment
      control_count: 10
      description: Assess and manage organizational risk
      key_controls: [RA-3 Risk Assessment, RA-5 Vulnerability Monitoring and Scanning, RA-7 Risk Response]

    - id: SA
