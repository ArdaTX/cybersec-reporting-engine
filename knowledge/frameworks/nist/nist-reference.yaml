# NIST Standards Knowledge Base Reference
# CyberSec Reporting Engine
# Covers NIST CSF 2.0, 800-53 Rev 5, 800-61, 800-86, 800-115

metadata:
  organization: National Institute of Standards and Technology (NIST)
  url: https://www.nist.gov/cyberframework
  last_updated: "2025-01"

nist_csf_2_0:
  functions:
    - id: GV
      name: Govern
      description: Establish and monitor the organization's cybersecurity risk management strategy
      categories:
        - GV.OC: Organizational Context
        - GV.RM: Risk Management Strategy
        - GV.RR: Roles, Responsibilities, and Authorities
        - GV.PO: Policy
        - GV.OV: Oversight
        - GV.SC: Supply Chain Risk Management

    - id: ID
      name: Identify
      description: Develop organizational understanding to manage cybersecurity risk
      categories:
        - ID.AM: Asset Management
        - ID.RA: Risk Assessment
        - ID.IM: Improvement

    - id: PR
      name: Protect
      description: Implement safeguards to ensure delivery of critical services
      categories:
        - PR.AA: Identity Management, Authentication, and Access Control
        - PR.AT: Awareness and Training
        - PR.DS: Data Security
        - PR.PS: Platform Security
        - PR.IR: Technology Infrastructure Resilience

    - id: DE
      name: Detect
      description: Develop and implement activities to identify cybersecurity events
      categories:
        - DE.CM: Continuous Monitoring
        - DE.AE: Adverse Event Analysis

    - id: RS
      name: Respond
      description: Take action regarding a detected cybersecurity incident
      categories:
        - RS.MA: Incident Management
        - RS.AN: Incident Analysis
        - RS.CO: Incident Response Reporting and Communication
        - RS.MI: Incident Mitigation

    - id: RC
      name: Recover
      description: Restore capabilities or services impaired by an incident
      categories:
        - RC.RP: Incident Recovery Plan Execution
        - RC.CO: Incident Recovery Communication

  implementation_tiers:
    - id: Tier 1
      name: Partial
    - id: Tier 2
      name: Risk Informed
    - id: Tier 3
      name: Repeatable
    - id: Tier 4
      name: Adaptive

nist_800_53_rev5:
