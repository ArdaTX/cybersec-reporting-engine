nist_800_61_rev2:
  incident_response_phases:
    - phase: 1
      name: Preparation
      activities:
        - Develop incident response policy and plan
        - Establish IR team and assign roles
        - Acquire IR tools and resources
        - Conduct training and exercises
        - Implement preventative measures (firewalls, patching, endpoint protection)
      deliverables:
        - Incident Response Plan document
        - IR team contact list and escalation matrix
        - Jump kit (forensic tools, clean media, cables)
        - Tabletop exercise results
      tools:
        - SIEM platform (Splunk, Elastic, Sentinel)
        - EDR solution (CrowdStrike, Microsoft Defender, SentinelOne)
        - Forensic toolkit (FTK Imager, Volatility, KAPE)
        - Ticketing system (Jira, ServiceNow, TheHive)

    - phase: 2
      name: Detection and Analysis
      activities:
        - Identify incident indicators (precursors and indicators)
        - Correlate events from multiple sources
        - Determine incident scope and impact
        - Document incident timeline
        - Notify appropriate stakeholders
      deliverables:
        - Incident classification (severity, type, priority)
        - Initial incident report
        - Evidence log with chain of custody
      tools:
        - Log analysis platform (Splunk, ELK, Sentinel)
        - Network traffic analysis (Wireshark, Zeek)
        - Threat intelligence platforms (MISP, OpenCTI)
        - IOC enrichment (VirusTotal, AbuseIPDB)

    - phase: 3
      name: Containment, Eradication, and Recovery
      activities:
        - Contain the incident (network isolation, account disablement)
        - Gather and preserve forensic evidence
        - Eradicate threat (malware removal, patching, credential reset)
        - Restore systems from clean backups
        - Validate system integrity before restoration
        - Monitor for residual adversary activity
      deliverables:
        - Containment strategy and execution log
        - Eradication validation report
        - System recovery checklist
        - Post-recovery monitoring report
      tools:
        - EDR for isolation and remediation
        - Backup and recovery systems (Veeam, Rubrik)
        - Vulnerability scanner for validation (Nessus, Qualys)
        - Configuration management (Ansible, Terraform)

    - phase: 4
      name: Post-Incident Activity
      activities:
        - Conduct post-incident review (lessons learned)
        - Document root cause analysis
        - Update IR playbooks and procedures
        - Generate incident report with recommendations
        - Track remediation items to closure
        - Share threat intelligence internally and externally
      deliverables:
        - Post-incident review report
        - Updated IR plan and playbooks
        - Remediation tracking plan
        - Threat intelligence advisory (if applicable)

nist_800_86:
  forensics_principles:
    - principle: Evidence Integrity
      description: Maintain cryptographic integrity of forensic evidence through hash verification
      practices:
        - Hash all acquired evidence (SHA-256 or better)
        - Document chain of custody throughout evidence lifecycle
        - Use write blockers during acquisition
        - Validate forensic tool output

    - principle: Data Collection Order
      description: Collect evidence in order of volatility
      order:
        - 1: Memory (volatile) - RAM dumps, running processes, network connections
        - 2: Network state - ARP cache, routing tables, active connections
        - 3: Running processes - process lists, open files, loaded modules
        - 4: System state - logged-on users, system time, configuration
        - 5: Disk images - forensic images of storage media
        - 6: Backups and logs - archived data, log files, external media

    - principle: Documentation
      description: Thoroughly document all forensic activities
      practices:
        - Record date/time of each action (UTC)
        - Document tool name, version, and commands used
        - Photograph physical evidence in original location
        - Note any system state changes caused by investigation
        - Maintain investigation log with timestamps

    - principle: Tool Validation
      description: Ensure forensic tools produce reliable results
      practices:
        - Use court-accepted or peer-reviewed tools
        - Verify tool output against known datasets
        - Document tool validation methodology
        - Use multiple tools for critical findings (cross-validation)

nist_800_115:
  testing_methodology:
    - phase: 1
      name: Planning
      activities:
        - Define scope and objectives
        - Identify target systems and networks
        - Obtain proper authorization (Rules of Engagement)
        - Establish testing schedule and coordinated contacts
      deliverables:
        - Test Plan
        - Rules of Engagement document
        - Authorization letter

    - phase: 2
      name: Discovery
      activities:
        - Passive reconnaissance (OSINT, DNS, public records)
        - Active network scanning (Nmap, Nessus)
        - Vulnerability scanning and enumeration
        - Service fingerprinting and banner grabbing
      techniques:
        - Network port scanning (TCP, UDP)
        - Service version detection
        - OS fingerprinting
        - Web application crawling and spidering
      tools:
        - Nmap, Masscan (port scanning)
        - Nessus, Qualys, OpenVAS (vulnerability scanning)
        - Nikto, Burp Suite, ZAP (web application scanning)
        - theHarvester, DNSRecon (reconnaissance)

    - phase: 3
      name: Attack
      activities:
        - Exploit identified vulnerabilities
        - Password attacks (brute force, credential stuffing)
        - Social engineering (phishing, vishing)
        - Web application exploitation (XSS, SQLi, CSRF)
        - Privilege escalation and lateral movement
      techniques:
        - Exploit public-facing applications
        - Brute force and password spraying
        - Phishing and spearphishing
        - Session hijacking and replay attacks
        - Post-exploitation (persistence, lateral movement)
      tools:
        - Metasploit Framework
        - Cobalt Strike (authorized)
        - Hydra (password attacks)
        - Impacket suite
        - BloodHound (AD enumeration)
        - Mimikatz (credential extraction)

    - phase: 4
      name: Reporting
      activities:
        - Document findings with severity ratings
        - Map findings to CVSS and MITRE ATT&CK
        - Provide remediation recommendations
        - Conduct out-brief with stakeholders
      deliverables:
        - Executive summary report
        - Technical findings report
        - Remediation roadmap
        - Risk assessment update
