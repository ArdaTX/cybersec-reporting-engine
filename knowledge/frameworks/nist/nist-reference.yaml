      key_controls: [AC-2 Account Management, AC-3 Access Enforcement, AC-6 Least Privilege, AC-17 Remote Access]

    - id: AT
      name: Awareness and Training
      control_count: 6
      description: Ensure personnel are trained on security risks
      key_controls: [AT-2 Literacy Training and Awareness, AT-3 Role-based Training]

    - id: AU
      name: Audit and Accountability
      control_count: 16
      description: Create, protect, and retain system audit records
      key_controls: [AU-2 Event Logging, AU-3 Content of Audit Records, AU-6 Audit Record Review, AU-12 Audit Record Generation]

    - id: CA
      name: Assessment, Authorization, and Monitoring
      control_count: 9
      description: Evaluate security controls and authorize system operations
      key_controls: [CA-2 Control Assessments, CA-7 Continuous Monitoring, CA-8 Penetration Testing]

    - id: CM
      name: Configuration Management
      control_count: 14
      description: Establish and maintain baseline configurations
      key_controls: [CM-2 Baseline Configuration, CM-6 Configuration Settings, CM-7 Least Functionality, CM-8 System Component Inventory]

    - id: CP
