# =============================================================================
# CYBERSEC REPORTING ENGINE — FINDING SCHEMA v2.1
# =============================================================================
# This schema defines the canonical structure for all security findings
# generated by the CyberSec Reporting Engine. Variations must be validated
# against this schema before ingestion.
# =============================================================================

version: "2.1"
schema_id: "cybersec-finding-v2"
description: "Canonical security finding schema for the CyberSec Reporting Engine"

# ───────────────────────────────────────────────────────────────
# FIELD DEFINITIONS
# ───────────────────────────────────────────────────────────────

fields:

  # ── Identification ─────────────────────────────────────────

  finding_id:
    type: string
    required: true
    pattern: "^[A-Z]{3}-\\d{4}-[A-Z]{3}$"
    description: "Unique finding identifier (e.g., CRN-0001-WEB)"
    example: "CRN-0001-AUT"

  title:
    type: string
    required: true
    min_length: 10
    max_length: 200
    description: "Concise, descriptive finding title suitable for executive audiences"
    example: "Pre-Auth Remote Code Execution in Customer Portal (CVE-{{year}}-{{id}})"

  category:
    type: string
    required: true
    enum:
      - authentication
      - authorization
      - cryptography
      - configuration
      - data_exposure
      - injection
      - business_logic
      - session_management
      - network_security
      - cloud_security
      - endpoint_security
      - identity_and_access
      - supply_chain
      - physical_security
      - social_engineering
      - compliance
      - vulnerability_management
      - logging_and_monitoring
      - other
    description: "Primary finding category"

  owasp_category:
    type: string
    required: false
    enum:
      - A01_Broken_Access_Control
      - A02_Cryptographic_Failures
      - A03_Injection
      - A04_Insecure_Design
      - A05_Security_Misconfiguration
      - A06_Vulnerable_Components
      - A07_Auth_Failures
      - A08_Software_Data_Integrity
      - A09_Logging_Monitoring_Failures
      - A10_SSRF
      - API1_BOLA
      - API2_Broken_Auth
      - API3_Property_Level_Auth
      - API4_Resource_Consumption
      - API5_Function_Level_Auth
      - API6_Unrestricted_Access
      - API7_SSRF
      - API8_Misconfiguration
      - API9_Inventory
      - API10_Unsafe_Consumption
    description: "OWASP Top 10 (Web or API) mapping"

  # ── Classification ─────────────────────────────────────────

  severity:
    type: string
    required: true
    enum:
      - critical
      - high
      - medium
      - low
      - informational
    description: "Overall finding severity level"

  likelihood:
    type: string
    required: true
    enum:
      - very_likely
      - likely
      - possible
      - unlikely
      - rare
    description: "Likelihood of successful exploitation in the target environment"

  impact:
    type: string
    required: true
    enum:
      - severe
      - significant
      - moderate
      - low
      - negligible
    description: "Business impact if the finding is successfully exploited"

  effort_to_remediate:
    type: string
    required: true
    enum:
      - trivial
      - low
      - moderate
      - significant
      - extensive
    description: "Estimated effort required to fully remediate the finding"

  # ── CVSS v4 Scoring ────────────────────────────────────────

  cvss_v4:
    type: object
    required: true
    properties:
      base_score:
        type: number
        required: true
        minimum: 0.0
        maximum: 10.0
        description: "CVSS v4.0 base score"
      vector_string:
        type: string
        required: true
        pattern: "^CVSS:4\\.0/AV:[NALP]/AC:[LH]/AT:[NP]/PR:[NLH]/UI:[NPA]/VC:[HLN]/VI:[HLN]/VA:[HLN]/SC:[HLN]/SI:[HLN]/SA:[HLN](/E:[XAPU])?(/CR:[XHLM])?(/IR:[XHLM])?(/AR:[XHLM])?(/MAV:[XNALP])?(/MAC:[XLH])?(/MAT:[XNP])?(/MPR:[XNLH])?(/MUI:[XNPA])?(/MVC:[XHLN])?(/MVI:[XHLN])?(/MVA:[XHLN])?$"
        description: "Full CVSS v4 vector string"
      attack_vector:
        type: string
        required: true
        enum: [N, A, L, P]  # Network, Adjacent, Local, Physical
      attack_complexity:
        type: string
        required: true
        enum: [L, H]
      attack_requirements:
        type: string
        required: true
        enum: [N, P]
      privileges_required:
        type: string
        required: true
        enum: [N, L, H]
      user_interaction:
        type: string
        required: true
        enum: [N, P, A]  # None, Passive, Active
      vuln_confidentiality:
        type: string
        required: true
        enum: [H, L, N]
      vuln_integrity:
        type: string
        required: true
        enum: [H, L, N]
      vuln_availability:
        type: string
        required: true
        enum: [H, L, N]
      sub_confidentiality:
        type: string
        required: true
        enum: [H, L, N]
      sub_integrity:
        type: string
        required: true
        enum: [H, L, N]
      sub_availability:
        type: string
        required: true
        enum: [H, L, N]
      exploit_maturity:
        type: string
        required: false
        enum: [X, A, P, U]
      env_metrics:
        type: object
        required: false
        properties:
          confidentiality_requirement:
            type: string
            enum: [X, H, M, L]
          integrity_requirement:
            type: string
            enum: [X, H, M, L]
          availability_requirement:
            type: string
            enum: [X, H, M, L]
          modified_attack_vector:
            type: string
            enum: [X, N, A, L, P]
          modified_attack_complexity:
            type: string
            enum: [X, L, H]
          modified_attack_requirements:
            type: string
            enum: [X, N, P]
          modified_privileges_required:
            type: string
            enum: [X, N, L, H]
          modified_user_interaction:
            type: string
            enum: [X, N, P, A]
      temporal_score:
        type: number
        required: false
        minimum: 0.0
        maximum: 10.0
      environmental_score:
        type: number
        required: false
        minimum: 0.0
        maximum: 10.0

  # ── Threat Intelligence Mapping ────────────────────────────

  cwe:
    type: string
    required: false
    pattern: "^CWE-\\d{1,5}$"
    description: "Common Weakness Enumeration ID"
    example: "CWE-89"

  capec:
    type: array
    required: false
    items:
      type: string
      pattern: "^CAPEC-\\d{1,5}$"
    description: "Common Attack Pattern Enumeration and Classification IDs"
    example: ["CAPEC-66"]

  mitre_attack:
    type: object
    required: false
    properties:
      tactic:
        type: string
        required: true
        enum:
          - reconnaissance
          - resource_development
          - initial_access
          - execution
          - persistence
          - privilege_escalation
          - defense_evasion
          - credential_access
          - discovery
          - lateral_movement
          - collection
          - command_and_control
          - exfiltration
          - impact
      technique_id:
        type: string
        required: true
        pattern: "^T\\d{4}(\\.\\d{3})?$"
        description: "MITRE ATT&CK technique or sub-technique ID"
      technique_name:
        type: string
        required: true
      sub_technique_id:
        type: string
        required: false
        pattern: "^T\\d{4}\\.\\d{3}$"
      sub_technique_name:
        type: string
        required: false
      detection_difficulty:
        type: string
        required: false
        enum:
          - very_easy
          - easy
          - moderate
          - hard
          - very_hard
          - impossible_without_dedicated_tooling
    description: "MITRE ATT&CK framework mapping (Enterprise Matrix)"

  kill_chain_phase:
    type: string
    required: false
    enum:
      - reconnaissance
      - weaponization
      - delivery
      - exploitation
      - installation
      - command_and_control
      - actions_on_objectives
    description: "Lockheed Martin Cyber Kill Chain phase"

  diamond_model:
    type: object
    required: false
    properties:
      adversary:
        type: string
      capability:
        type: string
      infrastructure:
        type: string
      victim:
        type: string
    description: "Diamond Model of Intrusion Analysis"

  # ── Impact Analysis ────────────────────────────────────────

  business_impact:
    type: string
    required: true
    min_length: 50
    max_length: 2000
    description: "Business-level impact description suitable for non-technical stakeholders"

  technical_impact:
    type: string
    required: true
    min_length: 50
    max_length: 2000
    description: "Technical impact description for engineering and operations audiences"

  affected_assets:
    type: array
    required: true
    min_items: 1
    items:
      type: object
      properties:
        hostname:
          type: string
          required: true
        ip_address:
          type: string
          required: false
          format: ipv4-or-ipv6
        asset_type:
          type: string
          required: true
          enum:
            - web_application
            - api_endpoint
            - database
            - server
            - workstation
            - network_device
            - cloud_service
            - container
            - mobile_application
            - thick_client
            - iot_device
            - ot_device
            - identity_provider
            - saas_application
            - source_code_repository
            - ci_cd_pipeline
            - other
        environment:
          type: string
          required: true
          enum:
            - production
            - staging
            - development
            - testing
            - disaster_recovery
            - external
            - internal
        criticality:
          type: string
          required: true
          enum:
            - tier_0_critical
            - tier_1_high
            - tier_2_medium
            - tier_3_low
            - tier_4_non_critical
    description: "List of affected assets and their attributes"

  # ── Evidence & Reproduction ────────────────────────────────

  evidence:
    type: array
    required: true
    min_items: 1
    items:
      type: object
      properties:
        type:
          type: string
          required: true
          enum:
            - screenshot
            - code_snippet
            - terminal_output
            - log_excerpt
            - network_capture
            - configuration_file
            - http_request_response
            - memory_dump
            - forensic_image
            - tool_output
            - video_recording
            - other
        description:
          type: string
          required: true
          max_length: 500
        data:
          type: string
          required: true
          max_length: 10000
          description: "Base64-encoded evidence or inline text"
        mime_type:
          type: string
          required: false
        filename:
          type: string
          required: false
    description: "Supporting evidence for the finding"

  reproduction_steps:
    type: array
    required: true
    min_items: 1
    max_items: 20
    items:
      type: object
      properties:
        step_number:
          type: integer
          required: true
          minimum: 1
        description:
          type: string
          required: true
          max_length: 1000
        expected_result:
          type: string
          required: false
        actual_result:
          type: string
          required: false
        prerequisites:
          type: array
          required: false
          items:
            type: string
    description: "Step-by-step reproduction instructions"

  attack_scenario:
    type: string
    required: true
    min_length: 50
    max_length: 3000
    description: "Narrative description of a realistic attack scenario exploiting this finding"

  # ── Remediation ────────────────────────────────────────────

  remediation:
    type: object
    required: true
    properties:
      summary:
        type: string
        required: true
        max_length: 1000
      detailed_steps:
        type: array
        required: true
        items:
          type: string
      patch_information:
        type: string
        required: false
      configuration_changes:
        type: array
        required: false
        items:
          type: string
      architectural_changes:
        type: array
        required: false
        items:
          type: string
      compensating_controls:
        type: array
        required: false
        items:
          type: string
      references:
        type: array
        required: false
        items:
          type: string

  validation:
    type: object
    required: true
    properties:
      method:
        type: string
        required: true
        enum:
          - rescan
          - manual_verification
          - configuration_review
          - code_review
          - penetration_test
          - audit_log_review
          - monitoring_alert
      expected_result:
        type: string
        required: true
      validation_date:
        type: string
        required: false
        format: date
      validated_by:
        type: string
        required: false
      status:
        type: string
        required: false
        enum:
          - pending_validation
          - validated_fixed
          - validated_risk_accepted
          - not_reproducible

  # ── References ─────────────────────────────────────────────

  references:
    type: array
    required: false
    items:
      type: object
      properties:
        type:
          type: string
          required: true
          enum:
            - cve
            - vendor_advisory
            - nist_nvd
            - exploit_db
            - white_paper
            - blog_post
            - research_paper
            - tool_documentation
            - internal_document
            - regulatory_requirement
            - framework_reference
            - other
        title:
          type: string
          required: true
        url:
          type: string
          required: false
          format: uri
        cve_id:
          type: string
          required: false
          pattern: "^CVE-\\d{4}-\\d{4,}$"
    description: "External references and related advisories"

  # ── Tracking ───────────────────────────────────────────────

  discovery_date:
    type: string
    required: true
    format: date
    description: "Date the finding was first identified"

  discovery_method:
    type: string
    required: true
    enum:
      - automated_scan
      - manual_testing
      - code_review
      - configuration_audit
      - threat_modeling
      - user_report
      - incident_response
      - third_party_disclosure
      - internal_audit
      - red_team

  status:
    type: string
    required: true
    enum:
      - open
      - in_progress
      - remediated
      - risk_accepted
      - false_positive
      - duplicate
      - wont_fix
      - deferred
      - closed

  assigned_to:
    type: string
    required: false
    description: "Individual or team responsible for remediation"

  sla_due_date:
    type: string
    required: false
    format: date
    description: "Remediation SLA deadline based on severity"

  risk_accepted_by:
    type: string
    required: false
    description: "Authorizing individual if risk acceptance was granted"

  risk_acceptance_expiry:
    type: string
    required: false
    format: date

  # ── Metadata ───────────────────────────────────────────────

  engagement_id:
    type: string
    required: true
    pattern: "^ENG-\\d{4}-\\d{3}$"

  report_id:
    type: string
    required: false

  tags:
    type: array
    required: false
    items:
      type: string

  related_findings:
    type: array
    required: false
    items:
      type: string
    description: "IDs of related findings for correlation"

  last_updated:
    type: string
    required: true
    format: date-time

  reviewer_notes:
    type: string
    required: false
    max_length: 2000


# ───────────────────────────────────────────────────────────────
# VALIDATION RULES (cross-field constraints)
# ───────────────────────────────────────────────────────────────

validation_rules:

  - rule: "critical-finding-requires-reproduction"
    description: "All Critical findings must include reproduction steps"
    expression: "severity == 'critical' implies reproduction_steps.length >= 3"

  - rule: "cve-requires-references"
    description: "Findings citing a CVE must include a reference entry"
    expression: "any(references[*].type == 'cve') implies references.length >= 1"

  - rule: "exploited-findings-must-have-evidence"
    description: "Findings successfully exploited must have evidence"
    expression: "kill_chain_phase in ['exploitation', 'installation'] implies evidence.length >= 1"

  - rule: "sla-must-be-set-for-open-findings"
    description: "Open findings above Low severity must have an SLA due date"
    expression: "status == 'open' and severity in ['critical', 'high', 'medium'] implies sla_due_date != null"

  - rule: "risk-acceptance-must-have-authorization"
    description: "Risk accepted findings must record the authorizing individual"
    expression: "status == 'risk_accepted' implies risk_accepted_by != null"


# ───────────────────────────────────────────────────────────────
# COMPLETE EXAMPLE FINDING
# ───────────────────────────────────────────────────────────────

example_finding:
  finding_id: "CRN-0001-AUT"
  title: "Pre-Authentication Remote Code Execution via Unsafe Deserialization in Customer Portal API"
  category: "injection"
  owasp_category: "A08_Software_Data_Integrity"
  severity: "critical"
  likelihood: "likely"
  impact: "severe"
  effort_to_remediate: "moderate"

  cvss_v4:
    base_score: 9.8
    vector_string: "CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:H/VI:H/VA:H/SC:H/SI:H/SA:H"
    attack_vector: "N"
    attack_complexity: "L"
    attack_requirements: "N"
    privileges_required: "N"
    user_interaction: "N"
    vuln_confidentiality: "H"
    vuln_integrity: "H"
    vuln_availability: "H"
    sub_confidentiality: "H"
    sub_integrity: "H"
    sub_availability: "H"
    exploit_maturity: "A"

  cwe: "CWE-502"
  capec:
    - "CAPEC-586"

  mitre_attack:
    tactic: "initial_access"
    technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    detection_difficulty: "easy"

  kill_chain_phase: "exploitation"

  business_impact: >
    Successful exploitation provides an unauthenticated attacker with
    SYSTEM-level remote code execution on the customer portal application
    server. The portal processes and stores personally identifiable
    information (PII) for approximately 2.3 million customers, including
    full names, addresses, Social Security Numbers, and payment card data.
    Compromise of this system would trigger mandatory breach notification
    requirements under GDPR, CCPA, and PCI DSS, with estimated regulatory
    fines of $15M–$45M and irreparable reputational damage.

  technical_impact: >
    The application deserializes user-supplied data without type validation,
    allowing an attacker to inject arbitrary .NET gadget chains. This results
    in arbitrary code execution in the context of the IIS application pool
    identity (NT AUTHORITY\NETWORK SERVICE). From this foothold, an attacker
    can escalate to SYSTEM via JuicyPotato or PrintSpoofer, pivot to the
    internal network, access the backend MSSQL database, and extract the
    entire customer dataset.

  affected_assets:
    - hostname: "portal-prod-01.{{client_domain}}"
      ip_address: "{{example_ip}}"
      asset_type: "web_application"
      environment: "production"
      criticality: "tier_0_critical"
    - hostname: "portal-prod-02.{{client_domain}}"
      ip_address: "{{example_ip_2}}"
      asset_type: "web_application"
      environment: "production"
      criticality: "tier_0_critical"

  evidence:
    - type: "http_request_response"
      description: "HTTP request demonstrating unsafe deserialization payload"
      data: |
        POST /api/v2/customer/import HTTP/1.1
        Host: portal.{{client_domain}}
        Content-Type: application/json
        Authorization: Bearer null
        
        {"__type":"System.Windows.Data.ObjectDataProvider, PresentationFramework",
         "MethodName":"Start","ObjectInstance":{"__type":"System.Diagnostics.Process,
         System","StartInfo":{"__type":"System.Diagnostics.ProcessStartInfo,
         System","FileName":"cmd.exe","Arguments":"/c whoami > C:\\inetpub\\wwwroot\\poc.txt"}}}
    - type: "screenshot"
      description: "Proof-of-concept output confirming RCE"
      filename: "poc-rce-portal.png"
      data: "{{base64_screenshot_data}}"

  reproduction_steps:
    - step_number: 1
      description: "Navigate to https://portal.{{client_domain}}/api/v2/customer/import"
    - step_number: 2
      description: "Send a POST request with Content-Type: application/json"
    - step_number: 3
      description: "Include the ysoserial.net ObjectDataProvider gadget chain in the request body"
    - step_number: 4
      description: "Observe command execution via out-of-band callback or file write"
      expected_result: "Arbitrary command executed on the target server"
      actual_result: "Command executed successfully; POC file written to web root"

  attack_scenario: >
    A threat actor registers for a free-tier customer account, then enumerates
    the `/api/v2/customer/import` endpoint. Using a freely available
    ysoserial.net gadget chain, the attacker achieves remote code execution on
    the production portal server. From this initial foothold, they deploy a
    Cobalt Strike beacon for persistent C2 communication, perform internal
    reconnaissance via BloodHound, DCSync the domain controller to extract all
    user credential hashes, and exfiltrate the full customer database to an
    attacker-controlled cloud storage bucket.

  remediation:
    summary: "Implement strict type validation for all deserialized objects using a known-safe type whitelist or migrate to a safe serialization format such as JSON with schema validation."
    detailed_steps:
      - "Disable the BinaryFormatter and NetDataContractSerializer across the application"
      - "Implement a SerializationBinder that restricts deserialization to a known-safe type whitelist"
      - "Migrate the customer import API to use System.Text.Json with strict schema validation"
      - "Apply the principle of least privilege: run the IIS application pool under a dedicated, low-privilege service account"
      - "Deploy a WAF rule to block requests containing known .NET gadget chain signatures"
    compensating_controls:
      - "Temporarily disable the /api/v2/customer/import endpoint until remediation is deployed"
      - "Implement network segmentation to isolate the web tier from the database tier"
    references:
      - "https://learn.microsoft.com/en-us/dotnet/standard/serialization/binaryformatter-security-guide"
      - "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"

  validation:
    method: "penetration_test"
    expected_result: "Deserialization payloads are rejected with HTTP 400; type whitelist enforcement confirmed"

  references:
    - type: "cve"
      title: "CVE-{{year}}-{{id}}: .NET Framework Remote Code Execution Vulnerability"
      url: "https://nvd.nist.gov/vuln/detail/CVE-{{year}}-{{id}}"
      cve_id: "CVE-{{year}}-{{id}}"
    - type: "vendor_advisory"
      title: "Microsoft Security Advisory: BinaryFormatter Security Guidance"
      url: "https://aka.ms/binaryformatter"

  discovery_date: "{{example_discovery_date}}"
  discovery_method: "manual_testing"
  status: "open"
  assigned_to: "{{example_assignee}}"
  sla_due_date: "{{example_sla_date}}"

  engagement_id: "ENG-{{current_year}}-042"
  tags:
    - "rce"
    - "deserialization"
    - "pre-auth"
    - "critical"
    - "owasp-top-10-2021"
    - "pci-dss-req-6"
    - "gdpr-art-32"

  last_updated: "{{example_last_updated}}"
