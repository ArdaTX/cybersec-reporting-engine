# =============================================================================
# CYBERSEC REPORTING ENGINE — MASTER TEMPLATE CONFIGURATION v2.1
# =============================================================================
# This file governs template composition, variable substitution,
# conditional inclusion, inheritance chains, and rendering rules.
# =============================================================================

version: "2.1"
generator: "CyberSec Reporting Engine"
generator_version: "{{engine_version}}"

# ───────────────────────────────────────────────────────────────
# GLOBAL METADATA
# ───────────────────────────────────────────────────────────────

metadata:
  classification: "CONFIDENTIAL"
  tlp_default: "AMBER"
  copyright: "© {{engagement_year}} {{consulting_firm_name}}. All rights reserved."
  generator_notice: "Generated by CyberSec Reporting Engine v{{engine_version}} on {{generation_timestamp}}"
  page_size: "A4"
  margins:
    top: "25mm"
    bottom: "25mm"
    left: "20mm"
    right: "20mm"
  fonts:
    heading: "Helvetica, Arial, sans-serif"
    body: "Georgia, Times New Roman, serif"
    code: "Consolas, Courier New, monospace"
  color_scheme:
    critical: "#DC3545"
    high: "#FD7E14"
    medium: "#FFC107"
    low: "#198754"
    informational: "#6C757D"
    primary: "#0D6EFD"
    background: "#F8F9FA"


# ───────────────────────────────────────────────────────────────
# VARIABLE DEFINITIONS & SUBSTITUTION RULES
# ───────────────────────────────────────────────────────────────

variables:

  # ── Engagement Variables ────────────────────────────────────

  engagement_id:
    type: string
    required: true
    pattern: "^ENG-\\d{4}-\\d{3}$"
    description: "Unique engagement identifier"

  engagement_type:
    type: string
    required: true
    enum:
      - "External Penetration Test"
      - "Internal Penetration Test"
      - "Web Application Security Assessment"
      - "Mobile Application Security Assessment"
      - "API Security Assessment"
      - "Cloud Security Assessment"
      - "Red Team Exercise"
      - "Purple Team Exercise"
      - "Social Engineering Assessment"
      - "Wireless Security Assessment"
      - "Physical Security Assessment"
      - "Active Directory Security Assessment"
      - "IoT Security Assessment"
      - "OT/ICS Security Assessment"
      - "Full-Scope Security Assessment"
      - "Configuration & Compliance Audit"
      - "Source Code Security Review"
      - "Threat Modeling Exercise"
      - "Ransomware Readiness Assessment"
      - "Incident Response Maturity Assessment"

  engagement_reference:
    type: string
    required: true
    description: "Statement of Work reference number"

  engagement_year:
    type: integer
    required: true
    description: "Year of the engagement"

  start_date:
    type: string
    required: true
    format: date

  end_date:
    type: string
    required: true
    format: date

  report_date:
    type: string
    required: true
    format: date

  document_version:
    type: string
    required: true
    pattern: "^\\d+\\.\\d+$"
    default: "1.0"

  # ── Client Variables ────────────────────────────────────────

  client_name:
    type: string
    required: true

  client_short_name:
    type: string
    required: false
    description: "Shorthand name used in text (e.g., 'Acme' for Acme Corporation)"

  client_address_line1:
    type: string
    required: true

  client_address_line2:
    type: string
    required: false

  client_domain:
    type: string
    required: true
    format: hostname

  client_industry:
    type: string
    required: true
    enum:
      - financial_services
      - healthcare
      - technology
      - government
      - defense
      - energy
      - manufacturing
      - retail
      - education
      - telecommunications
      - transportation
      - legal
      - insurance
      - media
      - pharmaceutical
      - other

  # ── Recipient Variables ─────────────────────────────────────

  recipient_name:
    type: string
    required: true

  recipient_title:
    type: string
    required: true

  recipient_salutation:
    type: string
    required: true

  recipient_organization:
    type: string
    required: true

  cc_recipients:
    type: string
    required: false

  # ── Consulting Firm Variables ───────────────────────────────

  consulting_firm_name:
    type: string
    required: true
    default: "{{DEFAULT_CONSULTING_FIRM}}"

  consulting_firm_address:
    type: string
    required: true

  consulting_firm_website:
    type: string
    required: false
    format: uri

  lead_consultant_name:
    type: string
    required: true

  lead_consultant_title:
    type: string
    required: true

  lead_consultant_email:
    type: string
    required: true
    format: email

  lead_consultant_phone:
    type: string
    required: false

  reviewer_name:
    type: string
    required: true

  reviewer_title:
    type: string
    required: true

  approver_name:
    type: string
    required: false

  # ── Methodology Variables ───────────────────────────────────

  risk_methodology:
    type: string
    required: true
    default: "CVSS v4.0 × Business Impact Quantification"

  maturity_framework:
    type: string
    required: false
    default: "NIST CSF 2.0"

  tlp_level:
    type: string
    required: true
    enum: [RED, AMBER, GREEN, CLEAR]
    default: "AMBER"


# ───────────────────────────────────────────────────────────────
# TEMPLATE INHERITANCE & COMPOSITION
# ───────────────────────────────────────────────────────────────

templates:

  # ── Executive Summary ───────────────────────────────────────

  executive_summary:
    path: "templates/executive/executive-summary.md"
    render_engine: "jinja2"
    output_filename: "{{engagement_id}}-Executive-Summary-v{{document_version}}.md"
    output_formats:
      - markdown
      - pdf
      - html
    conditional_inclusion:
      finding_04: "has_finding_04 and total_findings_count >= 4"
      finding_05: "has_finding_05 and total_findings_count >= 5"
      additional_distribution: "additional_distribution is defined and additional_distribution.length > 0"
    section_order:
      - classification_banner
      - cover_page
      - executive_summary_header
      - letter_intro
      - state_of_security_assessment
      - enterprise_risk_summary
      - key_findings
      - risk_distribution
      - strategic_recommendations
      - quick_wins
      - remediation_roadmap
      - conclusion
      - signature_block
      - distribution_list
      - document_control

  # ── Technical Report ────────────────────────────────────────

  technical_report:
    path: "templates/technical/technical-report.md"
    render_engine: "jinja2"
    output_filename: "{{engagement_id}}-Technical-Report-v{{document_version}}.md"
    output_formats:
      - markdown
      - pdf
      - html
    conditional_inclusion:
      critical_findings_section: "critical_count > 0"
      high_findings_section: "high_count > 0"
      medium_findings_section: "medium_count > 0"
      low_findings_section: "low_count > 0"
      informational_section: "info_count > 0"
      cloud_section: "cloud_environments is defined and cloud_env_count > 0"
      ad_section: "ad_description is defined"
      mobile_section: "mobile_app_count > 0"
    section_order:
      - cover_page
      - toc
      - exec_summary_abbreviated
      - assessment_overview
      - methodology
      - attack_surface_analysis
      - findings
      - risk_analysis
      - remediation_roadmap
      - conclusions
      - appendices

  # ── Findings Schema ─────────────────────────────────────────

  finding_schema:
    path: "templates/finding-schema/finding-schema.yaml"
    output_filename: "finding-schema-v{{schema_version}}.yaml"
    purpose: "Canonical schema for individual finding objects — used for validation, ingestion, and export"

  # ── Dashboards ──────────────────────────────────────────────

  dashboards:
    path: "templates/dashboards/dashboard-templates.md"
    render_engine: "jinja2"
    output_filename: "{{engagement_id}}-Dashboards-v{{document_version}}.md"
    output_formats:
      - markdown
      - html
    dashboards_included:
      - executive_risk_summary
      - technical_findings
      - compliance_coverage
      - remediation_tracking
      - soc_operations


# ───────────────────────────────────────────────────────────────
# VARIABLE SUBSTITUTION RULES
# ───────────────────────────────────────────────────────────────

substitution_rules:

  # ── Date Formatting ─────────────────────────────────────────
  - target: "report_date"
    format: "%B %d, %Y"
    example: "January 15, 2026"

  - target: "start_date"
    format: "%B %d, %Y"

  - target: "end_date"
    format: "%B %d, %Y"

  # ── Severity Badges ─────────────────────────────────────────
  - target: "finding_severity_badge"
    mapping:
      critical: "🔴 CRITICAL"
      high: "🟠 HIGH"
      medium: "🟡 MEDIUM"
      low: "🟢 LOW"
      informational: "🔵 INFORMATIONAL"

  # ── Risk Color Coding ───────────────────────────────────────
  - target: "risk_color_hex"
    mapping:
      critical: "#DC3545"
      high: "#FD7E14"
      medium: "#FFC107"
      low: "#198754"
      informational: "#6C757D"

  # ── Effort Labels ───────────────────────────────────────────
  - target: "effort_label"
    mapping:
      trivial: "< 1 day"
      low: "1–3 days"
      moderate: "1–2 weeks"
      significant: "2–6 weeks"
      extensive: "> 6 weeks"

  # ── Likelihood Labels ───────────────────────────────────────
  - target: "likelihood_label"
    mapping:
      very_likely: "Very Likely (> 80%)"
      likely: "Likely (50–80%)"
      possible: "Possible (20–50%)"
      unlikely: "Unlikely (5–20%)"
      rare: "Rare (< 5%)"

  # ── Status Labels ───────────────────────────────────────────
  - target: "status_label"
    mapping:
      open: "Open"
      in_progress: "In Progress"
      remediated: "Remediated"
      risk_accepted: "Risk Accepted"
      false_positive: "False Positive"
      duplicate: "Duplicate"
      wont_fix: "Won't Fix"
      deferred: "Deferred"
      closed: "Closed"

  # ── CVSS v4 Severity Bands ──────────────────────────────────
  - target: "cvss_v4_severity_label"
    mapping:
      "9.0-10.0": "Critical"
      "7.0-8.9": "High"
      "4.0-6.9": "Medium"
      "0.1-3.9": "Low"
      "0.0": "None"

  # ── MITRE ATT&CK Tactic Abbreviations ────────────────────────
  - target: "mitre_tactic_abbreviation"
    mapping:
      reconnaissance: "TA0043"
      resource_development: "TA0042"
      initial_access: "TA0001"
      execution: "TA0002"
      persistence: "TA0003"
      privilege_escalation: "TA0004"
      defense_evasion: "TA0005"
      credential_access: "TA0006"
      discovery: "TA0007"
      lateral_movement: "TA0008"
      collection: "TA0009"
      command_and_control: "TA0011"
      exfiltration: "TA0010"
      impact: "TA0040"


# ───────────────────────────────────────────────────────────────
# CONDITIONAL INCLUSION LOGIC
# ───────────────────────────────────────────────────────────────

conditional_logic:

  # ── Finding Display Rules ───────────────────────────────────
  - rule: "show_critical_findings_in_executive"
    condition: "critical_count > 0"
    action: "include"
    description: "Only include critical findings detail section when critical findings exist"

  - rule: "show_finding_reproduction_steps"
    condition: "finding.status in ['open', 'in_progress'] and finding.severity in ['critical', 'high']"
    action: "include"
    description: "Include detailed reproduction steps only for open/resolving high+ findings"

  - rule: "show_validation_section"
    condition: "finding.status == 'remediated' or finding.status == 'pending_validation'"
    action: "include"
    description: "Include validation section only for findings being validated"

  - rule: "show_patch_information"
    condition: "finding.remediation.patch_information is defined and finding.remediation.patch_information != ''"
    action: "include"
    description: "Conditionally show patch details when available"

  # ── Report Section Rules ────────────────────────────────────

  - rule: "show_cloud_section"
    condition: "cloud_env_count > 0"
    action: "include"
    template: "technical_report"
    section: "cloud_third_party_exposure"

  - rule: "show_ad_section"
    condition: "ad_domain_count > 0"
    action: "include"
    template: "technical_report"
    section: "internal_attack_surface_ad"

  - rule: "show_mobile_section"
    condition: "mobile_app_count > 0"
    action: "include"
    template: "technical_report"
    section: "mobile_findings"

  - rule: "show_social_engineering_section"
    condition: "engagement_type contains 'Social'"
    action: "include"
    template: "technical_report"
    section: "social_engineering_results"

  - rule: "show_physical_security_section"
    condition: "engagement_type contains 'Physical'"
    action: "include"
    template: "technical_report"
    section: "physical_security_results"

  - rule: "show_ot_ics_section"
    condition: "engagement_type contains 'OT' or engagement_type contains 'ICS'"
    action: "include"
    template: "technical_report"
    section: "ot_ics_specific_findings"

  # ── Dashboard Rules ─────────────────────────────────────────

  - rule: "include_soc_dashboard"
    condition: "soc_dashboard_enabled == true or engagement_type in ['Red Team Exercise', 'Purple Team Exercise', 'Incident Response Maturity Assessment']"
    action: "include"
    template: "dashboards"
    section: "soc_operations"

  - rule: "include_compliance_dashboard"
    condition: "compliance_frameworks is defined and compliance_frameworks.length > 0"
    action: "include"
    template: "dashboards"
    section: "compliance_coverage"


# ───────────────────────────────────────────────────────────────
# COMPUTED / DERIVED VARIABLES
# ───────────────────────────────────────────────────────────────

computed_variables:

  total_findings_count:
    expression: "critical_count + high_count + medium_count + low_count + info_count"

  exploitable_count:
    expression: "critical_count + high_count"

  critical_pct:
    expression: "round((critical_count / total_findings_count) * 100, 1)"

  high_pct:
    expression: "round((high_count / total_findings_count) * 100, 1)"

  medium_pct:
    expression: "round((medium_count / total_findings_count) * 100, 1)"

  low_pct:
    expression: "round((low_count / total_findings_count) * 100, 1)"

  info_pct:
    expression: "round((info_count / total_findings_count) * 100, 1)"

  cumulative_high:
    expression: "round(critical_pct + high_pct, 1)"

  cumulative_medium:
    expression: "round(critical_pct + high_pct + medium_pct, 1)"

  cumulative_low:
    expression: "round(critical_pct + high_pct + medium_pct + low_pct, 1)"

  mean_cvss:
    expression: "round(sum(findings[*].cvss_v4.base_score) / len(findings), 1)"

  median_cvss:
    expression: "median(findings[*].cvss_v4.base_score)"

  overall_risk_score:
    expression: "sum(findings[*].cvss_v4.base_score * severity_weight[findings[*].severity]) / len(findings)"

  sla_compliance_pct:
    expression: "round((findings[status == 'closed' and closed_date <= sla_due_date].length / findings[status == 'closed'].length) * 100, 1)"

  maturity_score:
    expression: "mean([nist_gv_score, nist_id_score, nist_pr_score, nist_de_score, nist_rs_score, nist_rc_score])"

  generation_timestamp:
    expression: "now().isoformat()"


# ───────────────────────────────────────────────────────────────
# SEVERITY WEIGHTING FOR AGGREGATE CALCULATIONS
# ───────────────────────────────────────────────────────────────

severity_weights:
  critical: 10
  high: 7
  medium: 4
  low: 1
  informational: 0

impact_weights:
  severe: 10
  significant: 7
  moderate: 4
  low: 1
  negligible: 0

likelihood_weights:
  very_likely: 5
  likely: 4
  possible: 3
  unlikely: 2
  rare: 1


# ───────────────────────────────────────────────────────────────
# OUTPUT RENDERING PIPELINES
# ───────────────────────────────────────────────────────────────

pipelines:

  executive_report:
    steps:
      - action: "collect_variables"
        sources: ["engagement_data", "findings_data", "client_data", "risk_data"]
      - action: "compute_derived_variables"
      - action: "apply_substitution_rules"
      - action: "evaluate_conditionals"
      - action: "render_template"
        template: "executive_summary"
      - action: "inject_classification_banner"
      - action: "generate_pdf"
        engine: "weasyprint"
        options:
          page_size: "A4"
          margin: "20mm"
      - action: "generate_html"
        inline_css: true

  technical_report:
    steps:
      - action: "collect_variables"
        sources: ["engagement_data", "findings_data", "client_data", "methodology_data", "tools_data", "timeline_data"]
      - action: "compute_derived_variables"
      - action: "apply_substitution_rules"
      - action: "evaluate_conditionals"
      - action: "render_template"
        template: "technical_report"
      - action: "insert_table_of_contents"
      - action: "insert_page_breaks"
      - action: "generate_pdf"
        engine: "weasyprint"
        options:
          page_size: "A4"
          margin: "18mm"
          toc_depth: 3
      - action: "generate_html"
        inline_css: true

  dashboard_report:
    steps:
      - action: "collect_variables"
        sources: ["findings_data", "risk_data", "compliance_data", "remediation_data", "soc_data"]
      - action: "compute_derived_variables"
      - action: "evaluate_dashboard_conditionals"
      - action: "render_template"
        template: "dashboards"
      - action: "validate_mermaid_syntax"
      - action: "render_mermaid_to_svg"
      - action: "generate_html"
        inline_css: true

  finding_schema_validation:
    steps:
      - action: "load_schema"
      - action: "validate_all_findings"
        stop_on_error: true
      - action: "generate_validation_report"


# ───────────────────────────────────────────────────────────────
# INTERNATIONALIZATION & LOCALIZATION
# ───────────────────────────────────────────────────────────────

i18n:
  default_locale: "en-US"
  supported_locales:
    - "en-US"
    - "en-GB"
    - "es-ES"
    - "fr-FR"
    - "de-DE"
  date_format_by_locale:
    en-US: "%B %d, %Y"
    en-GB: "%d %B %Y"
    es-ES: "%d de %B de %Y"
    fr-FR: "%d %B %Y"
    de-DE: "%d. %B %Y"
  number_format_by_locale:
    en-US:
      decimal: "."
      thousands: ","
    en-GB:
      decimal: "."
      thousands: ","
    es-ES:
      decimal: ","
      thousands: "."
    fr-FR:
      decimal: ","
      thousands: " "
    de-DE:
      decimal: ","
      thousands: "."


# ───────────────────────────────────────────────────────────────
# EXTENSIONS & PLUGINS
# ───────────────────────────────────────────────────────────────

extensions:
  - name: "custom-cis-benchmark-mapping"
    description: "Maps findings to CIS Benchmark controls automatically"
    enabled: true
  - name: "live-cve-enrichment"
    description: "Enriches finding references with live CVE data from NVD API"
    enabled: false
  - name: "mitre-attack-intelligence"
    description: "Pulls latest ATT&CK technique metadata during report generation"
    enabled: true
  - name: "epss-scoring"
    description: "Adds EPSS (Exploit Prediction Scoring System) scores to findings"
    enabled: false
  - name: "ssvc-decision-tree"
    description: "Applies CISA SSVC prioritization to remediation roadmaps"
    enabled: false

# ───────────────────────────────────────────────────────────────
# END OF CONFIGURATION
# ───────────────────────────────────────────────────────────────
