# =============================================================================
# Severity Badge Definitions — CyberSec Reporting Engine
# Defines visual badges for all five severity levels used across reports.
# Supports SVG, HTML/CSS, Markdown, and Unicode text rendering modes.
# =============================================================================

version: 1.0.0
description: "Severity badge system for CyberSec Reporting Engine"

# ---------------------------------------------------------------------------
# Severity Level Definitions
# ---------------------------------------------------------------------------
severities:

  critical:
    label: "Critical"
    short_label: "CRIT"
    emoji: "🔴"
    css_class: "badge-critical"
    color_hex: "#e74c3c"
    color_bg: "rgba(231, 76, 60, 0.15)"
    color_border: "#e74c3c"
    cvss_range: "9.0 - 10.0"
    priority: 1
    description: "Immediate action required. Exploitation could lead to full system compromise."
    remediation_sla: "24 hours"
    escalation: "CISO + Incident Response Team"
    svg_badge: |
      <svg xmlns="http://www.w3.org/2000/svg" width="88" height="24" viewBox="0 0 88 24">
        <rect width="88" height="24" rx="4" fill="#e74c3c" opacity="0.15"/>
        <rect x="0" y="0" width="4" height="24" rx="2" fill="#e74c3c"/>
        <text x="10" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e74c3c">🔴 CRITICAL</text>
      </svg>
    markdown_badge: "![Critical](https://img.shields.io/badge/CRITICAL-e74c3c?style=for-the-badge&logo=shield&logoColor=white)"
    html_badge: |
      <span class="severity-badge badge-critical">
        <span class="severity-badge__dot"></span>
        <span class="severity-badge__label">Critical</span>
      </span>

  high:
    label: "High"
    short_label: "HIGH"
    emoji: "🟠"
    css_class: "badge-high"
    color_hex: "#e67e22"
    color_bg: "rgba(230, 126, 34, 0.15)"
    color_border: "#e67e22"
    cvss_range: "7.0 - 8.9"
    priority: 2
    description: "Urgent remediation needed. Significant risk to confidentiality, integrity, or availability."
    remediation_sla: "7 days"
    escalation: "Security Manager + System Owner"
    svg_badge: |
      <svg xmlns="http://www.w3.org/2000/svg" width="75" height="24" viewBox="0 0 75 24">
        <rect width="75" height="24" rx="4" fill="#e67e22" opacity="0.15"/>
        <rect x="0" y="0" width="4" height="24" rx="2" fill="#e67e22"/>
        <text x="10" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e67e22">🟠 HIGH</text>
      </svg>
    markdown_badge: "![High](https://img.shields.io/badge/HIGH-e67e22?style=for-the-badge&logo=shield&logoColor=white)"
    html_badge: |
      <span class="severity-badge badge-high">
        <span class="severity-badge__dot"></span>
        <span class="severity-badge__label">High</span>
      </span>

  medium:
    label: "Medium"
    short_label: "MED"
    emoji: "🟡"
    css_class: "badge-medium"
    color_hex: "#f1c40f"
    color_bg: "rgba(241, 196, 15, 0.15)"
    color_border: "#f1c40f"
    cvss_range: "4.0 - 6.9"
    priority: 3
    description: "Should be remediated in the next patch cycle. Moderate risk to operations."
    remediation_sla: "30 days"
    escalation: "System Owner"
    svg_badge: |
      <svg xmlns="http://www.w3.org/2000/svg" width="90" height="24" viewBox="0 0 90 24">
        <rect width="90" height="24" rx="4" fill="#f1c40f" opacity="0.15"/>
        <rect x="0" y="0" width="4" height="24" rx="2" fill="#f1c40f"/>
        <text x="10" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f1c40f">🟡 MEDIUM</text>
      </svg>
    markdown_badge: "![Medium](https://img.shields.io/badge/MEDIUM-f1c40f?style=for-the-badge&logo=shield&logoColor=black)"
    html_badge: |
      <span class="severity-badge badge-medium">
        <span class="severity-badge__dot"></span>
        <span class="severity-badge__label">Medium</span>
      </span>

  low:
    label: "Low"
    short_label: "LOW"
    emoji: "🟢"
    css_class: "badge-low"
    color_hex: "#2ecc71"
    color_bg: "rgba(46, 204, 113, 0.15)"
    color_border: "#2ecc71"
    cvss_range: "0.1 - 3.9"
    priority: 4
    description: "Low risk. Remediate as part of standard maintenance cycle."
    remediation_sla: "90 days"
    escalation: "Tracked in backlog"
    svg_badge: |
      <svg xmlns="http://www.w3.org/2000/svg" width="69" height="24" viewBox="0 0 69 24">
        <rect width="69" height="24" rx="4" fill="#2ecc71" opacity="0.15"/>
        <rect x="0" y="0" width="4" height="24" rx="2" fill="#2ecc71"/>
        <text x="10" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2ecc71">🟢 LOW</text>
      </svg>
    markdown_badge: "![Low](https://img.shields.io/badge/LOW-2ecc71?style=for-the-badge&logo=shield&logoColor=white)"
    html_badge: |
      <span class="severity-badge badge-low">
        <span class="severity-badge__dot"></span>
        <span class="severity-badge__label">Low</span>
      </span>

  info:
    label: "Informational"
    short_label: "INFO"
    emoji: "🔵"
    css_class: "badge-info"
    color_hex: "#3498db"
    color_bg: "rgba(52, 152, 219, 0.15)"
    color_border: "#3498db"
    cvss_range: "N/A"
    priority: 5
    description: "No direct risk. Provides context, observations, or hardening recommendations."
    remediation_sla: "N/A"
    escalation: "For awareness only"
    svg_badge: |
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="24" viewBox="0 0 120 24">
        <rect width="120" height="24" rx="4" fill="#3498db" opacity="0.15"/>
        <rect x="0" y="0" width="4" height="24" rx="2" fill="#3498db"/>
        <text x="10" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#3498db">🔵 INFORMATIONAL</text>
      </svg>
    markdown_badge: "![Info](https://img.shields.io/badge/INFORMATIONAL-3498db?style=for-the-badge&logo=shield&logoColor=white)"
    html_badge: |
      <span class="severity-badge badge-info">
        <span class="severity-badge__dot"></span>
        <span class="severity-badge__label">Informational</span>
      </span>

# ---------------------------------------------------------------------------
# Badge CSS Base Styles
# ---------------------------------------------------------------------------
css: |
  .severity-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 4px;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.5;
    white-space: nowrap;
    border: 1px solid transparent;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .severity-badge__dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Critical */
  .badge-critical {
    background: rgba(231, 76, 60, 0.15);
    color: #e74c3c;
    border-color: rgba(231, 76, 60, 0.35);
  }
  .badge-critical .severity-badge__dot {
    background: #e74c3c;
    box-shadow: 0 0 6px rgba(231, 76, 60, 0.6);
  }

  /* High */
  .badge-high {
    background: rgba(230, 126, 34, 0.15);
    color: #e67e22;
    border-color: rgba(230, 126, 34, 0.35);
  }
  .badge-high .severity-badge__dot {
    background: #e67e22;
    box-shadow: 0 0 6px rgba(230, 126, 34, 0.5);
  }

  /* Medium */
  .badge-medium {
    background: rgba(241, 196, 15, 0.15);
    color: #d4a017;
    border-color: rgba(241, 196, 15, 0.35);
  }
  .badge-medium .severity-badge__dot {
    background: #f1c40f;
    box-shadow: 0 0 6px rgba(241, 196, 15, 0.5);
  }

  /* Low */
  .badge-low {
    background: rgba(46, 204, 113, 0.15);
    color: #2ecc71;
    border-color: rgba(46, 204, 113, 0.35);
  }
  .badge-low .severity-badge__dot {
    background: #2ecc71;
    box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
  }

  /* Informational */
  .badge-info {
    background: rgba(52, 152, 219, 0.15);
    color: #3498db;
    border-color: rgba(52, 152, 219, 0.35);
  }
  .badge-info .severity-badge__dot {
    background: #3498db;
    box-shadow: 0 0 6px rgba(52, 152, 219, 0.5);
  }

# ---------------------------------------------------------------------------
# CVSS Score Badge Mapping
# ---------------------------------------------------------------------------
cvss_thresholds:
  critical: 9.0
  high: 7.0
  medium: 4.0
  low: 0.1
  info: 0.0
