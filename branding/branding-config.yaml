# =============================================================================
# Master Branding Configuration — CyberSec Reporting Engine
# Central registry for all themes, components, assets, and override rules.
# This file is the single source of truth for the reporting engine's
# visual identity system.
# =============================================================================

version: 1.0.0
engine: "CyberSec Reporting Engine"
last_updated: "2026-06-01"

# =============================================================================
# 1. Theme Registry
# =============================================================================
themes:
  default: "enterprise-dark"
  available:
    - id: enterprise-dark
      name: "Enterprise Dark"
      path: "themes/enterprise-dark/theme.yaml"
      recommended_for:
        - executive_reports
        - board_presentations
        - dark_mode_environments
      preview: "assets/previews/enterprise-dark.png"

    - id: enterprise-light
      name: "Enterprise Light"
      path: "themes/enterprise-light/theme.yaml"
      recommended_for:
        - printed_reports
        - client_deliverables
        - accessibility_compliance
      preview: "assets/previews/enterprise-light.png"

    - id: executive-blue
      name: "Executive Blue"
      path: "themes/executive-blue/theme.yaml"
      recommended_for:
        - c_suite_briefings
        - board_decks
        - premium_deliverables
      preview: "assets/previews/executive-blue.png"

    - id: security-ops
      name: "Security Operations"
      path: "themes/security-ops/theme.yaml"
      recommended_for:
        - soc_dashboards
        - incident_reports
        - operational_briefings
      preview: "assets/previews/security-ops.png"

# =============================================================================
# 2. Component Registry
# =============================================================================
components:
  cover_pages:
    path: "components/cover-pages/"
    templates:
      - id: enterprise-cover
        name: "Enterprise Cover"
        file: "enterprise-cover.md"
        compatible_themes: ["enterprise-dark", "enterprise-light"]
      - id: executive-cover
        name: "Executive Cover"
        file: "executive-cover.md"
        compatible_themes: ["executive-blue"]
      - id: technical-cover
        name: "Technical Cover"
        file: "technical-cover.md"
        compatible_themes: ["security-ops", "enterprise-dark"]

  severity_badges:
    path: "components/severity-badges/"
    config: "badges.yaml"
    rendering_modes:
      - html
      - svg
      - markdown
      - unicode_emoji

  executive_tables:
    path: "components/executive-tables/"
    stylesheet: "tables.css"

  risk_cards:
    path: "components/risk-cards/"
    stylesheet: "cards.css"

  kpi_widgets:
    path: "components/kpi-widgets/"
    config: "kpi.yaml"

  mermaid_templates:
    path: "components/mermaid-templates/"
    config: "charts.yaml"
    engine: "mermaid.js"
    min_version: "10.0.0"

# =============================================================================
# 3. Asset Paths
# =============================================================================
assets:
  fonts:
    base_path: "assets/fonts/"
    primary: "Inter"
    headings: "Inter"
    serif_headings: "Playfair Display"
    monospace: "JetBrains Mono"
    fallback_sans: "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    fallback_mono: "ui-monospace, SFMono-Regular, 'Cascadia Code', 'Fira Code', monospace"
    font_display: "swap"

  logos:
    base_path: "assets/logos/"
    formats: ["svg", "png"]
    default_logo: "company-logo.svg"
    default_logo_dark: "company-logo-light.svg"
    icon: "company-icon.svg"

  icons:
    set: "lucide"
    base_path: "assets/icons/"
    license: "ISC"

  images:
    base_path: "assets/images/"
    report_watermark: "watermark-confidential.svg"
    background_patterns: "patterns/"

  previews:
    base_path: "assets/previews/"
    theme_previews: true
    component_previews: true

# =============================================================================
# 4. Default Settings
# =============================================================================
defaults:
  document:
    page_size: "A4"
    orientation: "portrait"
    language: "en-US"
    timezone: "UTC"

  classification:
    default: "CONFIDENTIAL"
    available:
      - "UNCLASSIFIED"
      - "INTERNAL"
      - "CONFIDENTIAL"
      - "SECRET"
      - "TOP SECRET"
    banner_text: "This document contains proprietary information intended for authorized recipients only."
    show_on_cover: true
    show_on_header: true
    show_on_footer: true

  tlp:
    default: "AMBER"
    available:
      - "CLEAR"
      - "GREEN"
      - "AMBER"
      - "AMBER+STRICT"
      - "RED"

  report_metadata:
    show_document_id: true
    show_version: true
    show_date: true
    show_prepared_by: true
    show_reviewed_by: true
    show_classification: true
    show_document_hash: false
    show_page_numbers: true
    starting_page_number: 1

  severity:
    default_cvss_version: "3.1"
    show_cvss_score: true
    show_cvss_vector: true

  charts:
    engine: "mermaid"
    responsive: true
    dark_mode_auto: true

# =============================================================================
# 5. Brand Override Rules
# =============================================================================
overrides:
  # Client-specific overrides take precedence over theme defaults
  rules:
    - scope: "client.*.brand_primary_color"
      priority: 100
      description: "Client brand color replaces primary theme color"

    - scope: "client.*.logo"
      priority: 100
      description: "Client logo replaces default on cover and header"

    - scope: "client.*.classification_banner_color"
      priority: 90
      description: "Override classification banner background"

    - scope: "engagement.*.tLP"
      priority: 95
      description: "Engagement-specific TLP level"

    - scope: "engagement.*.watermark_text"
      priority: 80
      description: "Custom watermark text per engagement"

  # Merging strategy
  merge_strategy: "deep_merge"
  # client > engagement > theme > defaults (highest to lowest priority)

# =============================================================================
# 6. Typography Scale (Global)
# =============================================================================
typography:
  scale:
    display:    { size: "40px", weight: 700, line_height: 1.1, usage: "Hero sections" }
    h1:         { size: "28px", weight: 700, line_height: 1.3, usage: "Report titles" }
    h2:         { size: "24px", weight: 600, line_height: 1.3, usage: "Section headings" }
    h3:         { size: "20px", weight: 600, line_height: 1.3, usage: "Subsection headings" }
    h4:         { size: "16px", weight: 600, line_height: 1.35, usage: "Card titles" }
    body:       { size: "14px", weight: 400, line_height: 1.6, usage: "Body text" }
    body_small: { size: "13px", weight: 400, line_height: 1.5, usage: "Dense body text" }
    small:      { size: "12px", weight: 400, line_height: 1.4, usage: "Captions, metadata" }
    caption:    { size: "11px", weight: 400, line_height: 1.3, usage: "Table captions" }
    overline:   { size: "10px", weight: 700, line_height: 1.2, usage: "Labels, badges", letter_spacing: "1px", transform: "uppercase" }

# =============================================================================
# 7. Color Roles (Semantic Mapping)
# =============================================================================
color_roles:
  # These roles are resolved at build time to the active theme's color values
  page_background:      "background"
  content_background:   "surface"
  heading_text:         "text_primary"
  body_text:            "text_primary"
  secondary_text:       "text_secondary"
  muted_text:           "text_muted"
  link:                 "link"
  link_hover:           "link_hover"
  table_header_bg:      "background_alt"
  table_border:         "border"
  table_stripe:         "background_alt"
  code_background:      "background_alt"
  blockquote_border:    "accent_secondary"
  callout_info_bg:      "severity.info_bg"
  callout_warning_bg:   "severity.medium_bg"
  callout_danger_bg:    "severity.critical_bg"
  callout_success_bg:   "severity.low_bg"

# =============================================================================
# 8. Report Section Templates
# =============================================================================
sections:
  order:
    - cover_page
    - table_of_contents
    - executive_summary
    - methodology
    - findings_summary
    - detailed_findings
    - risk_matrix
    - compliance_mapping
    - remediation_roadmap
    - appendices
    - back_cover

  executive_summary:
    max_pages: 3
    include_kpi_strip: true
    include_risk_gauge: true
    include_top_findings: true
    max_top_findings: 5

  findings_summary:
    include_severity_chart: true
    include_cvss_distribution: true
    include_aging_chart: true
    include_remediation_status: true

  detailed_findings:
    sort_by: "severity"
    group_by: "severity"
    max_per_group: 50
    include_evidence: true
    include_remediation: true

  compliance_mapping:
    frameworks:
      - id: nist-csf
        name: "NIST Cybersecurity Framework v2.0"
        functions: ["Govern", "Identify", "Protect", "Detect", "Respond", "Recover"]
      - id: mitre-attack
        name: "MITRE ATT&CK v15"
        matrices: ["Enterprise", "Cloud"]
      - id: iso27001
        name: "ISO 27001:2022"
        clauses: ["A.5", "A.6", "A.7", "A.8"]
      - id: pci-dss
        name: "PCI DSS v4.0.1"
        requirements: ["Req 1-12"]
      - id: cis
        name: "CIS Critical Security Controls v8"
        ig_levels: ["IG1", "IG2", "IG3"]

# =============================================================================
# 9. Output Formats
# =============================================================================
output:
  formats:
    - id: pdf
      name: "PDF Document"
      extension: ".pdf"
      default: true
      options:
        engine: "wkhtmltopdf"
        margin_top: "20mm"
        margin_bottom: "20mm"
        margin_left: "15mm"
        margin_right: "15mm"
        enable_toc: true
        enable_bookmarks: true
        print_background: true

    - id: html
      name: "HTML Report"
      extension: ".html"
      default: false
      options:
        standalone: true
        embed_assets: true
        responsive: true

    - id: md
      name: "Markdown"
      extension: ".md"
      default: false
      options:
        embed_images: "base64"
        preserve_frontmatter: true

    - id: json
      name: "Structured Data"
      extension: ".json"
      default: false
      options:
        schema: "csre-findings-schema-v1"
        pretty_print: true

# =============================================================================
# 10. Build Configuration
# =============================================================================
build:
  source_dir: "reports/"
  output_dir: "dist/"
  templates_dir: "branding/"
  assets_dir: "assets/"
  partials_dir: "branding/partials/"
  data_dir: "data/"

  processors:
    - name: "template-engine"
      type: "handlebars"
      partials_glob: "branding/partials/**/*.hbs"

    - name: "theme-resolver"
      type: "yaml"
      order: 1

    - name: "component-loader"
      type: "yaml"
      order: 2

    - name: "mermaid-renderer"
      type: "mermaid-cli"
      output_format: "svg"
      order: 3

    - name: "css-inliner"
      type: "juice"
      order: 4

    - name: "pdf-generator"
      type: "wkhtmltopdf"
      order: 5

# =============================================================================
# 11. Environment-Specific Configurations
# =============================================================================
environments:
  development:
    theme: "enterprise-dark"
    minify: false
    source_maps: true
    hot_reload: true
    debug: true

  staging:
    theme: "enterprise-light"
    minify: true
    source_maps: false
    hot_reload: false
    debug: false

  production:
    theme: "enterprise-dark"
    minify: true
    source_maps: false
    hot_reload: false
    debug: false
    optimize_images: true
    watermark_enabled: true

# =============================================================================
# 12. Accessibility Requirements
# =============================================================================
accessibility:
  target_level: "WCAG 2.1 AA"
  color_contrast:
    normal_text: 4.5   # minimum ratio
    large_text: 3.0    # minimum ratio
    ui_components: 3.0 # minimum ratio
  skip_to_content: true
  alt_text_required: true
  semantic_headings: true
  print_stylesheet: true
  prefers_reduced_motion: true
  prefers_color_scheme: true
