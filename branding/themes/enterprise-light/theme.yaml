# =============================================================================
# Enterprise Light Theme — CyberSec Reporting Engine
# Clean, high-readability light theme optimized for printed reports,
# client deliverables, and accessibility compliance (WCAG AA).
# =============================================================================
name: "Enterprise Light"
id: enterprise-light
version: 1.0.0
description: "Clean light theme for printed reports, client deliverables, and accessibility-optimized reading"

colors:
  primary: "#1a56db"
  primary_light: "#3b82f6"
  primary_dark: "#1e40af"
  secondary: "#475569"
  secondary_light: "#64748b"
  accent: "#2563eb"
  accent_dark: "#1d4ed8"
  accent_light: "#60a5fa"
  accent_secondary: "#0891b2"
  accent_secondary_dark: "#0e7490"
  accent_secondary_light: "#22d3ee"

  text_primary: "#0f172a"
  text_secondary: "#334155"
  text_muted: "#64748b"
  text_inverse: "#ffffff"

  background: "#ffffff"
  background_alt: "#f8fafc"
  surface: "#ffffff"
  surface_elevated: "#ffffff"
  surface_overlay: "rgba(255, 255, 255, 0.98)"

  border: "#e2e8f0"
  border_light: "#f1f5f9"
  border_focus: "#3b82f6"

  divider: "#e2e8f0"

  severity:
    critical: "#dc2626"
    critical_bg: "rgba(220, 38, 38, 0.08)"
    critical_border: "rgba(220, 38, 38, 0.30)"
    high: "#ea580c"
    high_bg: "rgba(234, 88, 12, 0.08)"
    high_border: "rgba(234, 88, 12, 0.30)"
    medium: "#ca8a04"
    medium_bg: "rgba(202, 138, 4, 0.08)"
    medium_border: "rgba(202, 138, 4, 0.30)"
    low: "#16a34a"
    low_bg: "rgba(22, 163, 74, 0.08)"
    low_border: "rgba(22, 163, 74, 0.30)"
    info: "#2563eb"
    info_bg: "rgba(37, 99, 235, 0.08)"
    info_border: "rgba(37, 99, 235, 0.30)"

  status:
    success: "#16a34a"
    warning: "#d97706"
    error: "#dc2626"
    pending: "#64748b"
    in_progress: "#2563eb"
    neutral: "#94a3b8"

  chart:
    series_1: "#2563eb"
    series_2: "#16a34a"
    series_3: "#dc2626"
    series_4: "#ca8a04"
    series_5: "#9333ea"
    series_6: "#ea580c"
    series_7: "#0891b2"
    series_8: "#db2777"
    grid: "#e2e8f0"
    axis: "#64748b"
    tooltip_bg: "#ffffff"
    tooltip_text: "#0f172a"

  link: "#2563eb"
  link_hover: "#1d4ed8"

typography:
  headings: "Inter, system-ui, -apple-system, sans-serif"
  body: "Inter, system-ui, -apple-system, sans-serif"
  code: "JetBrains Mono, ui-monospace, SFMono-Regular, monospace"
  sizes:
    h1: "28px"
    h2: "24px"
    h3: "20px"
    h4: "16px"
    body: "14px"
    small: "12px"
    caption: "11px"
    overline: "10px"
  weights:
    light: 300
    regular: 400
    medium: 500
    semibold: 600
    bold: 700
  line_heights:
    heading: 1.3
    body: 1.6
    compact: 1.2

spacing:
  unit: 8
  xs: "4px"
  sm: "8px"
  md: "16px"
  lg: "24px"
  xl: "32px"
  xxl: "48px"
  section: "64px"

borders:
  radius_sm: "4px"
  radius_md: "8px"
  radius_lg: "12px"
  radius_xl: "16px"
  radius_full: "9999px"

shadows:
  sm: "0 1px 2px rgba(0, 0, 0, 0.06)"
  md: "0 4px 6px rgba(0, 0, 0, 0.08)"
  lg: "0 10px 25px rgba(0, 0, 0, 0.10)"
  xl: "0 20px 50px rgba(0, 0, 0, 0.12)"

animation:
  transition_fast: "150ms ease"
  transition_normal: "250ms ease"
  transition_slow: "400ms ease"

icons:
  set: "lucide"
  size_sm: "14px"
  size_md: "18px"
  size_lg: "24px"

page:
  max_width: "1200px"
  content_width: "820px"
  margin: "32px auto"
  padding: "40px"

print:
  page_size: "A4"
  margin_top: "20mm"
  margin_bottom: "20mm"
  margin_left: "15mm"
  margin_right: "15mm"
