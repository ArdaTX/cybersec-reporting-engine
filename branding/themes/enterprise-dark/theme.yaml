# =============================================================================
# Enterprise Dark Theme — CyberSec Reporting Engine
# Premium dark theme optimized for executive reports, board presentations,
# and high-contrast readability in low-light environments.
# =============================================================================
name: "Enterprise Dark"
id: enterprise-dark
version: 1.0.0
description: "Premium dark theme for executive reports and board presentations"

colors:
  primary: "#1a2332"
  primary_light: "#243447"
  secondary: "#2c3e50"
  secondary_light: "#3d566e"
  accent: "#27ae60"
  accent_dark: "#1e8449"
  accent_light: "#2ecc71"
  accent_secondary: "#3498db"
  accent_secondary_dark: "#2980b9"
  accent_secondary_light: "#5dade2"

  text_primary: "#ecf0f1"
  text_secondary: "#bdc3c7"
  text_muted: "#7f8c8d"
  text_inverse: "#1a2332"

  background: "#0d1117"
  background_alt: "#111820"
  surface: "#161b22"
  surface_elevated: "#1c2333"
  surface_overlay: "rgba(22, 27, 34, 0.95)"

  border: "#30363d"
  border_light: "#21262d"
  border_focus: "#3498db"

  divider: "#21262d"

  severity:
    critical: "#e74c3c"
    critical_bg: "rgba(231, 76, 60, 0.15)"
    critical_border: "rgba(231, 76, 60, 0.40)"
    high: "#e67e22"
    high_bg: "rgba(230, 126, 34, 0.15)"
    high_border: "rgba(230, 126, 34, 0.40)"
    medium: "#f1c40f"
    medium_bg: "rgba(241, 196, 15, 0.15)"
    medium_border: "rgba(241, 196, 15, 0.40)"
    low: "#2ecc71"
    low_bg: "rgba(46, 204, 113, 0.15)"
    low_border: "rgba(46, 204, 113, 0.40)"
    info: "#3498db"
    info_bg: "rgba(52, 152, 219, 0.15)"
    info_border: "rgba(52, 152, 219, 0.40)"

  status:
    success: "#27ae60"
    warning: "#f39c12"
    error: "#e74c3c"
    pending: "#7f8c8d"
    in_progress: "#3498db"
    neutral: "#95a5a6"

  chart:
    series_1: "#3498db"
    series_2: "#27ae60"
    series_3: "#e74c3c"
    series_4: "#f1c40f"
    series_5: "#9b59b6"
    series_6: "#e67e22"
    series_7: "#1abc9c"
    series_8: "#e91e63"
    grid: "#21262d"
    axis: "#7f8c8d"
    tooltip_bg: "#1c2333"
    tooltip_text: "#ecf0f1"

  link: "#58a6ff"
  link_hover: "#79b8ff"

typography:
  headings: "Inter, system-ui, -apple-system, sans-serif"
  body: "Inter, system-ui, -apple-system, sans-serif"
  code: "JetBrains Mono, ui-monospace, SFMono-Regular, monospace"
  sizes:
    h1: "28px"
    h2: "24px"
    h3: "20px"
    h4: "16px"
    body: "14px"
    small: "12px"
    caption: "11px"
    overline: "10px"
  weights:
    light: 300
    regular: 400
    medium: 500
    semibold: 600
    bold: 700
  line_heights:
    heading: 1.3
    body: 1.6
    compact: 1.2

spacing:
  unit: 8
  xs: "4px"
  sm: "8px"
  md: "16px"
  lg: "24px"
  xl: "32px"
  xxl: "48px"
  section: "64px"

borders:
  radius_sm: "4px"
  radius_md: "8px"
  radius_lg: "12px"
  radius_xl: "16px"
  radius_full: "9999px"

shadows:
  sm: "0 1px 2px rgba(0, 0, 0, 0.3)"
  md: "0 4px 6px rgba(0, 0, 0, 0.4)"
  lg: "0 10px 25px rgba(0, 0, 0, 0.5)"
  xl: "0 20px 50px rgba(0, 0, 0, 0.6)"

animation:
  transition_fast: "150ms ease"
  transition_normal: "250ms ease"
  transition_slow: "400ms ease"

icons:
  set: "lucide"
  size_sm: "14px"
  size_md: "18px"
  size_lg: "24px"

page:
  max_width: "1200px"
  content_width: "820px"
  margin: "32px auto"
  padding: "40px"

print:
  page_size: "A4"
  margin_top: "20mm"
  margin_bottom: "20mm"
  margin_left: "15mm"
  margin_right: "15mm"
